<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover  — lets the browser extend content into the
                            iPhone notch / home-indicator area, and
                            makes env(safe-area-inset-*) actually
                            report real values (they are zero without it).
      user-scalable=no    — kills the double-tap zoom on inputs. We
                            already force 16px font-size on mobile so
                            there's no accessibility loss.
      theme-color         — Android chrome uses this to tint the URL bar.
      apple-mobile-web-app-*  — makes the site behave PWA-like when a
                                 user "Add to Home Screen" on iOS.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="قطعتي" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>قِطَعتي — AutoParts Cloud</title>
  </head>
  <body class="font-sans bg-bg text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
